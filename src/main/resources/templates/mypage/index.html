<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - 도서관리시스템</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body style="display:flex; flex-direction:column; min-height:100vh;">

  <!-- 헤더 -->
  <div th:replace="~{_partials/header :: header}"></div>

  <!-- 메인 -->
  <main class="container"
        style="flex:1; display:flex; flex-direction:column; align-items:center; padding: 4rem 1rem;">

    <h1 style="font-size: 2rem; margin-bottom: 3rem; text-align:center;">
      마이페이지
    </h1>

    <!-- 카드 영역 -->
    <div style="width: 100%; max-width: 900px;
                background: var(--surface-color);
                border-radius: 16px;
                padding: 2rem;
                box-shadow: var(--shadow, 0 4px 20px rgba(0,0,0,0.05));">

      <h2 style="margin-bottom: 1.5rem;">📚 현재 대출 중인 도서</h2>

      <!-- 대출 목록 없음 -->
      <div th:if="${#lists.isEmpty(loans)}"
           style="padding: 2rem; text-align:center; color: var(--text-muted);">
        현재 대출 중인 도서가 없습니다.
      </div>

      <!-- 대출 목록 있음 -->
      <table th:if="${!#lists.isEmpty(loans)}"
             style="width:100%; border-collapse: collapse;">

        <thead>
          <tr style="border-bottom: 2px solid var(--border-color);">
            <th style="padding: 0.75rem; text-align:left;">제목</th>
            <th style="padding: 0.75rem; text-align:left;">저자</th>
            <th style="padding: 0.75rem; text-align:left;">출판사</th>
          </tr>
        </thead>

        <tbody>
          <tr th:each="loan : ${loans}"
              style="border-bottom: 1px solid var(--border-color);">

            <td style="padding: 0.75rem;" th:text="${loan.title}">제목</td>
            <td style="padding: 0.75rem;" th:text="${loan.author}">저자</td>
            <td style="padding: 0.75rem;" th:text="${loan.publisher}">출판사</td>

          </tr>
        </tbody>
      </table>

      <!-- 하단 버튼 -->
      <div style="display:flex; gap: 1rem; justify-content:center; margin-top: 2rem;">
        
        <a th:href="@{/list}"
           class="btn btn-primary btn-huge flex items-center justify-center">
          도서 대여하러 가기
        </a>

        <a th:href="@{/return}"
           class="btn btn-outline btn-huge flex items-center justify-center"
           style="background-color: var(--surface-color);">
          도서 반납하러 가기
        </a>

      </div>

    </div>

  </main>

  <!-- 푸터 -->
  <div th:replace="~{_partials/footer :: footer}"></div>

  <script th:src="@{/js/app.js}"></script>

</body>
</html>
